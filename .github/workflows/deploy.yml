name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Checkout atmospheris-js
        uses: actions/checkout@v4
        with:
          repository: atmospheris/atmospheris-js
          path: vendor/atmospheris-js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build atmospheris-js
        run: |
          cd vendor/atmospheris-js
          npm ci
          npm run build

      - name: Install website dependencies
        run: |
          mkdir -p ../atmospheris-js
          cp -r vendor/atmospheris-js/dist ../atmospheris-js/dist
          cp vendor/atmospheris-js/package.json ../atmospheris-js/package.json
          npm ci

      - name: Build website
        run: npm run build
        env:
          ATMOSPHERIS_PATH: ${{ github.workspace }}/vendor/atmospheris-js/dist/index.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
