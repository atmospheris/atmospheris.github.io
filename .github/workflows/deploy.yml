name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v4
        with:
          path: atmospheris.github.io

      - name: Checkout atmospheris-js
        uses: actions/checkout@v4
        with:
          repository: atmospheris/atmospheris-js
          path: atmospheris-js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build atmospheris-js
        run: |
          cd "$GITHUB_WORKSPACE/atmospheris-js"
          npm ci
          npm run build

      - name: Install website dependencies
        run: |
          cd "$GITHUB_WORKSPACE/atmospheris.github.io"
          npm ci

      - name: Build website
        run: |
          cd "$GITHUB_WORKSPACE/atmospheris.github.io"
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ github.workspace }}/atmospheris.github.io/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
